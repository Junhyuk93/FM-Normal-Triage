name: dinov2-h100
channels:
  - defaults
  - pytorch
  - nvidia
  - xformers
  - conda-forge
dependencies:
  - python=3.10
  - pytorch::pytorch=2.0.1
  - pytorch::pytorch-cuda=11.8.0
  - pytorch::torchvision=0.15.2
  - omegaconf
  - torchmetrics=0.10.3
  - fvcore
  - iopath
  - xformers::xformers
  - tensorboard
  - pip
  - pip:
    - git+https://github.com/facebookincubator/submitit
    - --extra-index-url https://pypi.nvidia.com cuml-cu11
    - openmim
    - wandb
